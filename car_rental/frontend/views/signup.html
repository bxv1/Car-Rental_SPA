<div class="row justify-content-center">
  <div class="col-md-8 col-lg-5">
    <div class="card auth-card shadow-lg">
      <div class="card-body p-4">
        <h3 class="mb-1">Create Account</h3>
        <p class="text-secondary mb-4">Start booking premium cars in minutes</p>

        <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
        <div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>

        <form ng-submit="signup()">
          <div class="mb-2"><label class="form-label">Name</label><input class="form-control" ng-model="user.name" required /></div>
          <div class="mb-2"><label class="form-label">Email</label><input class="form-control" type="email" ng-model="user.email" required /></div>
          <div class="mb-2"><label class="form-label">Password</label><input class="form-control" type="password" ng-model="user.password" required /></div>
          <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" ng-model="user.phone" required /></div>
          <button class="btn btn-success w-100" ng-disabled="loading">{{loading ? 'Creating...' : 'Create Account'}}</button>
        </form>

        <p class="text-center text-secondary mt-3 mb-0">Already have an account? <a href="#!/login">Login</a></p>
      </div>
    </div>
  </div>
</div>
