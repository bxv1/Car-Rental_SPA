<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Create Account</h3>

        <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
        <div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>

        <form ng-submit="signup()">
          <input class="form-control mb-2" placeholder="Name" ng-model="user.name" required />
          <input class="form-control mb-2" type="email" placeholder="Email" ng-model="user.email" required />
          <input class="form-control mb-2" type="password" placeholder="Password" ng-model="user.password" required />
          <input class="form-control mb-3" placeholder="Phone" ng-model="user.phone" required />

          <button class="btn btn-success w-100">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>
