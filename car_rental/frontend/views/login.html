<div class="col-md-4 offset-md-4">

<h3>Login</h3>

<form ng-submit="login()">

<input class="form-control mb-2"
type="email"
placeholder="Email"
ng-model="user.email">

<input class="form-control mb-2"
type="password"
placeholder="Password"
ng-model="user.password">

<button class="btn btn-primary w-100">
Login
</button>

</form>

</div>
