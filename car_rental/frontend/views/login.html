<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card auth-card shadow-lg">
      <div class="card-body p-4">
        <h3 class="mb-1">Login</h3>
        <p class="text-secondary mb-4">Access your rentals and bookings</p>

        <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>

        <form ng-submit="login()">
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" placeholder="name@example.com" ng-model="user.email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" placeholder="••••••••" ng-model="user.password" required />
          </div>
          <button class="btn btn-primary w-100" ng-disabled="loading">{{loading ? 'Signing in...' : 'Login'}}</button>
        </form>

        <p class="text-center text-secondary mt-3 mb-1">New here? <a href="#!/signup">Create account</a></p>
        <p class="text-center text-secondary mb-0"><a href="#!/forgot-password">Forgot password?</a></p>
      </div>
    </div>
  </div>
</div>
