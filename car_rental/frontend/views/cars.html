<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Available Cars</h2>
  <a class="btn btn-outline-primary" href="#!/dashboard">View My Bookings</a>
</div>

<div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
<div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>

<div class="row g-3">
  <div class="col-md-6 col-lg-4" ng-repeat="car in cars">
    <div class="card h-100 shadow-sm car-card">
      <img ng-src="{{car.image}}" class="card-img-top" alt="{{car.brand}} {{car.model}}" />

      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{car.brand}} {{car.model}}</h5>
        <p class="text-muted mb-2">Year: {{car.year}}</p>
        <p class="mb-2">{{car.description || 'Comfortable and reliable rental car.'}}</p>
        <p class="fw-bold mb-3">${{car.price_per_day}} / day</p>

        <div class="mt-auto">
          <label class="form-label small">Pickup date</label>
          <input type="date" class="form-control mb-2" ng-model="bookingDates[car.id].pickup" />

          <label class="form-label small">Return date</label>
          <input type="date" class="form-control mb-3" ng-model="bookingDates[car.id].return" />

          <button class="btn btn-primary w-100" ng-click="book(car)">Book Now</button>
        </div>
      </div>
    </div>
  </div>
</div>
