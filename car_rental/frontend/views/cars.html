<div class="d-flex justify-content-between flex-wrap gap-2 align-items-center mb-3">
  <h2 class="mb-0">Available Cars</h2>
  <a class="btn btn-outline-primary" href="#!/bookings">View Bookings</a>
</div>

<div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
<div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>
<div class="card" ng-if="loading"><div class="card-body text-center">Loading cars...</div></div>

<div class="row g-4" ng-if="!loading">
  <div class="col-md-6 col-xl-4" ng-repeat="car in cars">
    <div class="card h-100 car-card">
      <img ng-src="{{car.image}}" class="card-img-top" alt="{{car.brand}} {{car.model}}" />
      <div class="card-body d-flex flex-column">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <h5 class="card-title mb-0">{{car.brand}} {{car.model}}</h5>
          <span class="price-chip">${{car.price_per_day}}/day</span>
        </div>

        <p class="small text-muted mb-3">{{car.year}} • {{car.description || 'Clean, modern and ready for your next trip.'}}</p>

        <div class="mt-auto">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label small">Pickup</label>
              <input type="date" class="form-control" ng-model="bookingDates[car.id].pickup" />
            </div>
            <div class="col-6">
              <label class="form-label small">Return</label>
              <input type="date" class="form-control" ng-model="bookingDates[car.id].return" />
            </div>
          </div>
          <button class="btn btn-primary w-100 mt-3" ng-click="book(car)">Book now</button>
        </div>
      </div>
    </div>
  </div>
</div>
