<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    <div class="card auth-card shadow-lg">
      <div class="card-body p-4">
        <h3 class="mb-1">Forgot Password</h3>
        <p class="text-secondary mb-4">Reset your password and get back on the road.</p>

        <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
        <div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>

        <form ng-submit="resetPassword()">
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" ng-model="form.email" required />
          </div>
          <div class="mb-2">
            <label class="form-label">New Password</label>
            <input class="form-control" type="password" ng-model="form.newPassword" minlength="6" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" type="password" ng-model="form.confirmPassword" minlength="6" required />
          </div>

          <button class="btn btn-primary w-100" ng-disabled="loading">
            {{loading ? 'Updating...' : 'Reset Password'}}
          </button>
        </form>

        <p class="text-center text-secondary mt-3 mb-0"><a href="#!/login">Back to login</a></p>
      </div>
    </div>
  </div>
</div>
